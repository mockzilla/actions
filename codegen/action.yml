name: Mockzilla Codegen
description: Builds and publishes a codegen server to Mockzilla

inputs:
  token:
    description: GITHUB_TOKEN for repo identity verification
    required: true
  region:
    description: |
      Preferred AWS region for your Mockzilla simulation (e.g. us-east-1, ap-southeast-1).
      Used as a hint on first deploy only — if the region or its area is at capacity,
      the nearest available region is used instead. Has no effect after the Mockzilla
      simulation is already deployed. Optional.
    required: false
    default: ''
  memory:
    description: Memory allocated to the simulation in megabytes, in 128 MB increments (e.g. 128, 256, 512).
    required: false
    default: ''
  timeout:
    description: Request timeout for the simulation in milliseconds (e.g. 5000, 10000).
    required: false
    default: ''
  timeout-minutes:
    description: Maximum minutes to wait for the simulation to become active.
    required: false
    default: '5'

runs:
  using: composite
  steps:
    - name: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        REF: ${{ github.head_ref || github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PREFERRED_REGION: ${{ inputs.region }}
        MEMORY_MB: ${{ inputs.memory }}
        TIMEOUT_MS: ${{ inputs.timeout }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/functions.sh"

        if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
          handle_teardown "codegen"
        fi

        if [ ! -f "go.mod" ]; then
          post_error "codegen action requires go.mod in the repository root"
          exit 1
        fi

        echo "::notice::Building server binary..."
        GOARCH=arm64 GOOS=linux go build -o /tmp/mockzilla-server ./cmd/server || {
          post_error "Server build failed"
          exit 1
        }

        echo "::notice::Registering upload..."
        register_upload "codegen"

        echo "::notice::Uploading server binary..."
        curl -sf -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @/tmp/mockzilla-server || {
            post_error "Binary upload failed - your Mockzilla simulation was not updated"
            exit 1
          }

        poll_status
