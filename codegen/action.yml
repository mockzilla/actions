name: Mockzilla Codegen
description: Builds and publishes a codegen server to Mockzilla

inputs:
  token:
    description: GITHUB_TOKEN for repo identity verification
    required: true
  region:
    description: |
      Preferred AWS region for your Mockzilla simulation (e.g. us-east-1, ap-southeast-1).
      Used as a hint on first deploy only — if the region or its area is at capacity,
      the nearest available region is used instead. Has no effect after the Mockzilla
      simulation is already deployed. Optional.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        REF: ${{ github.head_ref || github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PREFERRED_REGION: ${{ inputs.region }}
      run: |
        post_error() {
          local msg="$1" upgrade="$2"
          local comment="**Mockzilla:** $msg"
          [ -n "$upgrade" ] && comment="$comment - [upgrade]($upgrade)"
          echo "::error::$msg"
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "$comment" --edit-last 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --body "$comment"
          fi
        }

        post_success() {
          local url="$1"
          echo "::notice::Mockzilla simulation publishing to $url (may take a moment to go live)"
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "**Mockzilla:** Mockzilla simulation publishing to $url (may take a moment to go live)" --edit-last 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --body "**Mockzilla:** Mockzilla simulation publishing to $url (may take a moment to go live)"
          fi
        }

        if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
          curl -sf -X POST "https://ingest.mockzilla.org/webhook?ref=${REF}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"event\":\"$EVENT\",\"action\":\"$ACTION\",\"mode\":\"codegen\"}" \
            2>&1 || post_error "Mockzilla teardown failed"
          exit 0
        fi

        if [ ! -f "go.mod" ]; then
          post_error "codegen action requires go.mod in the repository root"
          exit 1
        fi

        echo "::notice::Building server binary..."
        GOARCH=arm64 GOOS=linux go build -o /tmp/mockzilla-server ./... || {
          post_error "Server build failed"
          exit 1
        }

        REGION_FIELD=""
        [ -n "$PREFERRED_REGION" ] && REGION_FIELD=",\"preferred_region\":\"$PREFERRED_REGION\""

        echo "::notice::Registering upload..."
        RESPONSE=$(curl -sf -X POST "https://ingest.mockzilla.org/webhook?ref=${REF}" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"repo\":\"$REPO\",\"event\":\"$EVENT\",\"action\":\"$ACTION\",\"mode\":\"codegen\"${REGION_FIELD}}" \
          2>&1) || {
            post_error "Failed to reach Mockzilla"
            exit 1
          }

        ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
        MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty')
        UPGRADE_URL=$(echo "$RESPONSE" | jq -r '.upgrade_url // empty')

        if [ -n "$ERROR" ]; then
          post_error "$MESSAGE" "$UPGRADE_URL"
          exit 1
        fi

        UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url // empty')
        if [ -z "$UPLOAD_URL" ]; then
          post_error "No upload URL returned from Mockzilla"
          exit 1
        fi

        echo "::notice::Uploading server binary..."
        curl -sf -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @/tmp/mockzilla-server || {
            post_error "Binary upload failed - your Mockzilla simulation was not updated"
            exit 1
          }

        URL=$(echo "$RESPONSE" | jq -r '.url // empty')
        [ -n "$URL" ] && post_success "$URL"
