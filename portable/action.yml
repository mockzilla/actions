name: Mockzilla Portable
description: Publishes OpenAPI and static specs to Mockzilla

inputs:
  token:
    description: GITHUB_TOKEN for repo identity verification
    required: true

runs:
  using: composite
  steps:
    - name: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        REF: ${{ github.head_ref || github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        post_error() {
          local msg="$1" upgrade="$2"
          local comment="**Mockzilla:** $msg"
          [ -n "$upgrade" ] && comment="$comment — [upgrade]($upgrade)"
          echo "::error::$msg"
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "$comment" --edit-last 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --body "$comment"
          fi
        }

        post_success() {
          local url="$1"
          echo "::notice::API simulation live at $url"
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "**Mockzilla:** API simulation live at $url" --edit-last 2>/dev/null || \
            gh pr comment "$PR_NUMBER" --body "**Mockzilla:** API simulation live at $url"
          fi
        }

        if [ ! -d "openapi" ] && [ ! -d "static" ]; then
          echo "::warning::Nothing to publish — no openapi/ or static/ directory found"
          exit 0
        fi

        tar -czf /tmp/mockzilla-specs.tar.gz \
          $([ -d openapi ] && echo openapi) \
          $([ -d static ] && echo static)

        RESPONSE=$(curl -sf -X POST "https://ingest.mockzilla.org/webhook?ref=${REF}" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -F "specs=@/tmp/mockzilla-specs.tar.gz" \
          -F "repo=$REPO" \
          -F "event=$EVENT" \
          -F "action=$ACTION" \
          -F "mode=portable" \
          2>&1) || {
            post_error "Mockzilla publish failed"
            exit 1
          }

        ERROR=$(echo "$RESPONSE" | jq -r '.error // empty')
        MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty')
        UPGRADE_URL=$(echo "$RESPONSE" | jq -r '.upgrade_url // empty')
        URL=$(echo "$RESPONSE" | jq -r '.url // empty')

        if [ -n "$ERROR" ]; then
          post_error "$MESSAGE" "$UPGRADE_URL"
          exit 1
        fi

        [ -n "$URL" ] && post_success "$URL"
