name: Mockzilla Portable
description: Publishes OpenAPI and static specs to Mockzilla

inputs:
  token:
    description: GITHUB_TOKEN for repo identity verification
    required: true
  region:
    description: |
      Preferred AWS region for your Mockzilla simulation (e.g. us-east-1, ap-southeast-1).
      Used as a hint on first deploy only — if the region or its area is at capacity,
      the nearest available region is used instead. Has no effect after the Mockzilla
      simulation is already deployed. Optional.
    required: false
    default: ''
  memory-size:
    description: Memory allocated to the simulation in megabytes (e.g. 128, 256, 512).
    required: false
    default: '128'
  timeout:
    description: Request timeout for the simulation in seconds (e.g. 30, 60).
    required: false
    default: ''
  environment:
    description: JSON object of environment variables to set in the simulation (e.g. '{"ENV":"production","DEBUG":"true"}').
    required: false
    default: ''
  spec-dir:
    description: Directory containing OpenAPI specs. Defaults to 'openapi'.
    required: false
    default: 'openapi'
  static-dir:
    description: Directory containing static API responses. Defaults to 'static'.
    required: false
    default: 'static'
  timeout-minutes:
    description: Maximum minutes to wait for the simulation to become active.
    required: false
    default: '5'

runs:
  using: composite
  steps:
    - name: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        REF: ${{ github.head_ref || github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PREFERRED_REGION: ${{ inputs.region }}
        MEMORY_SIZE: ${{ inputs.memory-size }}
        TIMEOUT: ${{ inputs.timeout }}
        ENVIRONMENT: ${{ inputs.environment }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
        SPEC_DIR: ${{ inputs.spec-dir }}
        STATIC_DIR: ${{ inputs.static-dir }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/functions.sh"

        if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
          handle_teardown "portable"
        fi

        SPEC_DIR="${SPEC_DIR%/}"
        STATIC_DIR="${STATIC_DIR%/}"

        if [ ! -d "$SPEC_DIR" ] && [ ! -d "$STATIC_DIR" ]; then
          echo "::warning::Nothing to publish - no ${SPEC_DIR}/ or ${STATIC_DIR}/ directory found"
          exit 0
        fi

        echo "Packing specs..."
        TAR_ARGS=""
        TAR_TRANSFORM=""
        if [ -d "$SPEC_DIR" ]; then
          TAR_ARGS="$SPEC_DIR"
          [ "$SPEC_DIR" != "openapi" ] && TAR_TRANSFORM="--transform=s|^${SPEC_DIR}|openapi|"
        fi
        if [ -d "$STATIC_DIR" ]; then
          TAR_ARGS="$TAR_ARGS $STATIC_DIR"
          [ "$STATIC_DIR" != "static" ] && TAR_TRANSFORM="$TAR_TRANSFORM --transform=s|^${STATIC_DIR}|static|"
        fi
        [ -f app.yml ] && TAR_ARGS="$TAR_ARGS app.yml"
        [ -f context.yml ] && TAR_ARGS="$TAR_ARGS context.yml"

        tar -czf /tmp/mockzilla-specs.tar.gz $TAR_TRANSFORM $TAR_ARGS

        echo "Registering upload..."
        register_upload "portable"

        echo "Uploading specs..."
        curl -sf -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/gzip" \
          --data-binary @/tmp/mockzilla-specs.tar.gz || {
            post_error "Spec upload failed - your Mockzilla simulation was not updated"
            exit 1
          }

        poll_status
