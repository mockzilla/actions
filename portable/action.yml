name: Mockzilla Portable
description: Publishes OpenAPI and static specs to Mockzilla

inputs:
  token:
    description: GITHUB_TOKEN for repo identity verification
    required: true
  region:
    description: |
      Preferred AWS region for your Mockzilla simulation (e.g. us-east-1, ap-southeast-1).
      Used as a hint on first deploy only — if the region or its area is at capacity,
      the nearest available region is used instead. Has no effect after the Mockzilla
      simulation is already deployed. Optional.
    required: false
    default: ''
  timeout-minutes:
    description: Maximum minutes to wait for the simulation to become active.
    required: false
    default: '5'

runs:
  using: composite
  steps:
    - name: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPO: ${{ github.repository }}
        EVENT: ${{ github.event_name }}
        ACTION: ${{ github.event.action }}
        REF: ${{ github.head_ref || github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PREFERRED_REGION: ${{ inputs.region }}
        TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      run: |
        source "$GITHUB_ACTION_PATH/../shared/functions.sh"

        if [ "$EVENT" = "pull_request" ] && [ "$ACTION" = "closed" ]; then
          handle_teardown "portable"
        fi

        if [ ! -d "openapi" ] && [ ! -d "static" ]; then
          echo "::warning::Nothing to publish - no openapi/ or static/ directory found"
          exit 0
        fi

        echo "::notice::Packing specs..."
        tar -czf /tmp/mockzilla-specs.tar.gz \
          $([ -d openapi ] && echo openapi) \
          $([ -d static ] && echo static) \
          $([ -f app.yml ] && echo app.yml)

        echo "::notice::Registering upload..."
        register_upload "portable"

        echo "::notice::Uploading specs..."
        curl -sf -X PUT "$UPLOAD_URL" \
          -H "Content-Type: application/gzip" \
          --data-binary @/tmp/mockzilla-specs.tar.gz || {
            post_error "Spec upload failed - your Mockzilla simulation was not updated"
            exit 1
          }

        poll_status
